<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Streamer HUD Prototype</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: transparent !important;
  width: 100%; height: 100%;
  overflow: hidden;
}
html.bg-dark, html.bg-dark body {
  background: #0b0b0f !important;
}
#coreContainer {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 260px; height: 260px;
}
#diag {
  position: absolute; bottom: 8px; left: 8px;
  font-family: monospace; font-size: 10px;
  color: #5affe6; background: rgba(0,0,0,0.4);
  padding: 4px 8px; border-radius: 4px;
  display: none;
}
</style>
</head>
<body>
<div id="coreContainer"></div>
<div id="diag">Diagnostics loading...</div>
<script>
const params = new URLSearchParams(window.location.search);
const showDiag = params.has("diag");
if (showDiag) document.getElementById("diag").style.display = "block";
if (params.get("bg") === "dark") document.documentElement.classList.add("bg-dark");
function logDiag(text) {
  if (showDiag) document.getElementById("diag").textContent = text;
}

let coreScene, coreCamera, coreRenderer, coreParticles, basePositions;
let speakTime = 0;

function initCore() {
  const container = document.getElementById("coreContainer");
  coreScene = new THREE.Scene();
  coreCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  coreCamera.position.z = 3.2;
  coreRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  coreRenderer.setSize(260, 260);
  container.appendChild(coreRenderer.domElement);
  const count = 4500;
  basePositions = new Float32Array(count * 3);
  const radius = 1.15;
  for (let i = 0; i < count; i++) {
    const y = 1 - (i / (count - 1)) * 2;
    const r = Math.sqrt(1 - y * y);
    const theta = Math.PI * (1 + Math.sqrt(5)) * i;
    const x = Math.cos(theta) * r;
    const z = Math.sin(theta) * r;
    const jitter = 1 + (Math.random() - 0.5) * 0.08;
    basePositions[i*3] = x * radius * jitter;
    basePositions[i*3+1] = y * radius * jitter;
    basePositions[i*3+2] = z * radius * jitter;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(basePositions.slice(), 3));
  const canvas = document.createElement("canvas");
  canvas.width = 16; canvas.height = 16;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createRadialGradient(8,8,0,8,8,8);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad; ctx.fillRect(0,0,16,16);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.PointsMaterial({ size: 0.05, map: tex, transparent: true, opacity: 0.9, color: 0x5affe6, depthWrite: false, blending: THREE.AdditiveBlending });
  coreParticles = new THREE.Points(geo, mat);
  coreScene.add(coreParticles);
  animateCore();
}

let audioCtx, analyser, timeData, freqData, low, mid, high;
let voiceActive = false, voiceActiveTimer = 0;

async function initAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    source.connect(analyser);
    logDiag("AudioContext: " + audioCtx.state + " | Mic: granted");
  } catch (e) {
    logDiag("Mic error: " + e.message);
  }
}

function getBandLevels() {
  if (!analyser) return { low: 0, mid: 0, high: 0, overall: 0 };
  analyser.getByteFrequencyData(freqData);
  const n = freqData.length;
  const lowEnd = Math.floor(n * 0.15), midEnd = Math.floor(n * 0.5);
  let lowSum = 0, midSum = 0, highSum = 0;
  for (let i = 0; i < lowEnd; i++) lowSum += freqData[i];
  for (let i = lowEnd; i < midEnd; i++) midSum += freqData[i];
  for (let i = midEnd; i < n; i++) highSum += freqData[i];
  const low = (lowSum / lowEnd) / 255;
  const mid = (midSum / (midEnd - lowEnd)) / 255;
  const high = (highSum / (n - midEnd)) / 255;
  return { low, mid, high, overall: (low + mid + high) / 3 };
}

function animateCore() {
  requestAnimationFrame(animateCore);
  const bands = getBandLevels();
  const posAttr = coreParticles.geometry.attributes.position;
  const arr = posAttr.array;

  if (bands.overall > 0.06) {
    voiceActive = true;
    voiceActiveTimer = 30;
  } else if (voiceActiveTimer > 0) {
    voiceActiveTimer--;
  } else {
    voiceActive = false;
  }

  speakTime += 0.08 + bands.overall * 0.15;

  if (voiceActive) {
    const wobbleAmount = 0.08 + bands.high * 0.25;
    for (let i = 0; i < arr.length / 3; i++) {
      const wobble = 1 + (bands.low * 0.15 + wobbleAmount * Math.sin(speakTime * 2 + i * 0.3));
      arr[i*3] = basePositions[i*3] * wobble;
      arr[i*3+1] = basePositions[i*3+1] * wobble;
      arr[i*3+2] = basePositions[i*3+2] * wobble;
    }
    posAttr.needsUpdate = true;
    coreParticles.rotation.y += 0.006 + bands.overall * 0.03;
    const hue = 0.5 - bands.high * 0.15;
    coreParticles.material.color.setHSL(hue, 1, 0.65);
  } else {
    const idleWobble = 1 + Math.sin(speakTime * 0.6) * 0.02;
    for (let i = 0; i < arr.length / 3; i++) {
      arr[i*3] = basePositions[i*3] * idleWobble;
      arr[i*3+1] = basePositions[i*3+1] * idleWobble;
      arr[i*3+2] = basePositions[i*3+2] * idleWobble;
    }
    posAttr.needsUpdate = true;
    coreParticles.rotation.y += 0.002;
    coreParticles.material.color.setHex(0x5affe6);
  }

  if (showDiag) {
    logDiag(
      "Audio: " + (audioCtx ? audioCtx.state : "none") +
      " | low:" + bands.low.toFixed(2) +
      " mid:" + bands.mid.toFixed(2) +
      " high:" + bands.high.toFixed(2) +
      " | voice: " + (voiceActive ? "ACTIVE" : "idle")
    );
  }

  coreRenderer.render(coreScene, coreCamera);
}

initCore();
initAudio();
</script>
</body>
</html>
