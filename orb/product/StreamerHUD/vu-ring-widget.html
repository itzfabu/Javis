<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Streamer HUD Widget - VU Ring</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: transparent !important;
  width: 100%; height: 100%;
  overflow: hidden;
}
body.bg-dark { background: #0a0a12 !important; }
#container {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
#diag {
  position: absolute; bottom: 8px; left: 8px;
  font-family: monospace; font-size: 10px;
  color: #5affe6; background: rgba(0,0,0,0.4);
  padding: 4px 8px; border-radius: 4px;
  display: none;
  white-space: pre;
}
</style>
</head>
<body>
<div id="container"><canvas id="c"></canvas></div>
<div id="diag">Diagnostics loading...</div>
<script>
const params = new URLSearchParams(window.location.search);
const showDiag = params.has("diag");
if (showDiag) document.getElementById("diag").style.display = "block";
if (params.get("bg") === "dark") document.body.classList.add("bg-dark");

const THEMES = {
  cyan: "#5affe6", purple: "#b266ff", gold: "#ffcf7f", red: "#ff5a6e", green: "#6fff8f"
};
const themeName = params.get("theme") || "cyan";
const customColor = params.get("color");
const ringColor = customColor ? ("#" + customColor) : (THEMES[themeName] || THEMES.cyan);

const SIZES = { small: 180, medium: 260, large: 380 };
const sizeName = params.get("size") || "medium";
const dim = SIZES[sizeName] || SIZES.medium;

const testMode = params.has("test");

const canvas = document.getElementById("c");
canvas.width = dim;
canvas.height = dim;
const ctx = canvas.getContext("2d");

let persistedError = null;
function logDiag(statusLine) {
  if (!showDiag) return;
  const el = document.getElementById("diag");
  el.textContent = persistedError ? ("ERROR: " + persistedError + "\n" + statusLine) : statusLine;
}

let audioCtx, analyser, freqData;
let testClock = 0;

async function initAudio() {
  if (testMode) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    source.connect(analyser);
  } catch (e) {
    persistedError = e.name + ": " + e.message;
  }
}

function getOverallLevel() {
  if (testMode) {
    testClock += 0.03;
    const burst = Math.max(0, Math.sin(testClock * 0.4));
    return burst * ((Math.sin(testClock * 2) + 1) / 2) * 0.8;
  }
  if (!analyser) return 0;
  analyser.getByteFrequencyData(freqData);
  let sum = 0;
  for (let i = 0; i < freqData.length; i++) sum += freqData[i];
  return (sum / freqData.length) / 255;
}

const SEGMENTS = 48;
let smoothedLevel = 0;
let rotation = 0;

function hexToRgb(hex) {
  const h = hex.replace("#", "");
  return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
}
const [rC, gC, bC] = hexToRgb(ringColor);

function animate() {
  requestAnimationFrame(animate);
  const raw = getOverallLevel();
  smoothedLevel += (raw - smoothedLevel) * 0.1;
  rotation += 0.004 + smoothedLevel * 0.015;

  ctx.clearRect(0, 0, dim, dim);
  const cx = dim / 2, cy = dim / 2;
  const outerR = dim * 0.42;
  const segLen = dim * 0.09;
  const innerR = outerR - segLen;

  for (let i = 0; i < SEGMENTS; i++) {
    const angle = (i / SEGMENTS) * Math.PI * 2 + rotation;
    const wave = (Math.sin(angle * 3 - rotation * 4) + 1) / 2;
    const brightness = 0.15 + wave * 0.25 + smoothedLevel * 0.7;
    const clamped = Math.min(1, brightness);

    const x1 = cx + Math.cos(angle) * innerR, y1 = cy + Math.sin(angle) * innerR;
    const x2 = cx + Math.cos(angle) * outerR, y2 = cy + Math.sin(angle) * outerR;

    ctx.strokeStyle = "rgba(" + rC + "," + gC + "," + bC + "," + clamped + ")";
    ctx.lineWidth = dim * 0.012;
    ctx.lineCap = "round";
    ctx.shadowBlur = 8 * clamped;
    ctx.shadowColor = ringColor;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  const centerPulse = innerR * 0.35 * (0.7 + smoothedLevel * 0.5);
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, centerPulse);
  grad.addColorStop(0, "rgba(" + rC + "," + gC + "," + bC + "," + (0.5 + smoothedLevel * 0.4) + ")");
  grad.addColorStop(1, "rgba(" + rC + "," + gC + "," + bC + ",0)");
  ctx.shadowBlur = 0;
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, centerPulse, 0, Math.PI * 2);
  ctx.fill();

  logDiag(
    "Theme: " + themeName + " | Size: " + sizeName +
    " | Audio: " + (audioCtx ? audioCtx.state : (testMode ? "test-mode" : "none")) +
    " | level:" + smoothedLevel.toFixed(2)
  );
}

animate();
initAudio();
</script>
</body>
</html>
