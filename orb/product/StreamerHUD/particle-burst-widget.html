<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Streamer HUD Widget - Particle Burst</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: transparent !important;
  width: 100%; height: 100%;
  overflow: hidden;
}
body.bg-dark { background: #0a0a12 !important; }
#container {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
#diag {
  position: absolute; bottom: 8px; left: 8px;
  font-family: monospace; font-size: 10px;
  color: #5affe6; background: rgba(0,0,0,0.4);
  padding: 4px 8px; border-radius: 4px;
  display: none;
  white-space: pre;
}
</style>
</head>
<body>
<div id="container"><canvas id="c"></canvas></div>
<div id="diag">Diagnostics loading...</div>
<script>
const params = new URLSearchParams(window.location.search);
const showDiag = params.has("diag");
if (showDiag) document.getElementById("diag").style.display = "block";
if (params.get("bg") === "dark") document.body.classList.add("bg-dark");

const THEMES = { cyan: "#5affe6", purple: "#b266ff", gold: "#ffcf7f", red: "#ff5a6e", green: "#6fff8f" };
const themeName = params.get("theme") || "cyan";
const customColor = params.get("color");
const burstColor = customColor ? ("#" + customColor) : (THEMES[themeName] || THEMES.cyan);

const SIZES = { small: 220, medium: 320, large: 460 };
const sizeName = params.get("size") || "medium";
const dim = SIZES[sizeName] || SIZES.medium;

const testMode = params.has("test");

const canvas = document.getElementById("c");
canvas.width = dim;
canvas.height = dim;
const ctx = canvas.getContext("2d");

let persistedError = null;
function logDiag(statusLine) {
  if (!showDiag) return;
  const el = document.getElementById("diag");
  el.textContent = persistedError ? ("ERROR: " + persistedError + "\n" + statusLine) : statusLine;
}

let audioCtx, analyser, freqData;
let testClock = 0, testNextBurst = 60;

async function initAudio() {
  if (testMode) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    source.connect(analyser);
  } catch (e) {
    persistedError = e.name + ": " + e.message;
  }
}

function getInstantLevel() {
  if (testMode) {
    testClock++;
    if (testClock >= testNextBurst) {
      testClock = 0;
      testNextBurst = 50 + Math.random() * 90;
      return 0.9;
    }
    return 0.02 + Math.random() * 0.02;
  }
  if (!analyser) return 0;
  analyser.getByteFrequencyData(freqData);
  let sum = 0;
  for (let i = 0; i < freqData.length; i++) sum += freqData[i];
  return (sum / freqData.length) / 255;
}

function hexToRgb(hex) {
  const h = hex.replace("#", "");
  return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
}
const [rC, gC, bC] = hexToRgb(burstColor);

let rollingAvg = 0.03;
let burstCooldown = 0;
let particles = [];
const ambient = [];
for (let i = 0; i < 14; i++) {
  ambient.push({
    angle: Math.random() * Math.PI * 2,
    radius: dim * (0.05 + Math.random() * 0.12),
    speed: 0.002 + Math.random() * 0.003,
    size: 1.5 + Math.random() * 2
  });
}

function spawnBurst() {
  const count = 60;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3.5;
    particles.push({
      x: 0, y: 0,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.008 + Math.random() * 0.012,
      size: 2 + Math.random() * 3
    });
  }
}

function animate() {
  requestAnimationFrame(animate);
  const level = getInstantLevel();
  rollingAvg += (level - rollingAvg) * 0.01;

  if (burstCooldown > 0) burstCooldown--;
  if (level > rollingAvg * 2.2 && level > 0.15 && burstCooldown <= 0) {
    spawnBurst();
    burstCooldown = 30;
  }

  ctx.clearRect(0, 0, dim, dim);
  const cx = dim / 2, cy = dim / 2;

  ambient.forEach(a => {
    a.angle += a.speed;
    const x = cx + Math.cos(a.angle) * a.radius;
    const y = cy + Math.sin(a.angle) * a.radius;
    ctx.beginPath();
    ctx.arc(x, y, a.size, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(" + rC + "," + gC + "," + bC + ",0.35)";
    ctx.shadowBlur = 4;
    ctx.shadowColor = burstColor;
    ctx.fill();
  });

  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= p.decay;
    ctx.beginPath();
    ctx.arc(cx + p.x, cy + p.y, p.size * Math.max(0, p.life), 0, Math.PI * 2);
    ctx.fillStyle = "rgba(" + rC + "," + gC + "," + bC + "," + Math.max(0, p.life) + ")";
    ctx.shadowBlur = 10;
    ctx.shadowColor = burstColor;
    ctx.fill();
  });

  logDiag(
    "Theme: " + themeName + " | Size: " + sizeName +
    " | Audio: " + (audioCtx ? audioCtx.state : (testMode ? "test-mode" : "none")) +
    " | particles:" + particles.length + " | avg:" + rollingAvg.toFixed(2)
  );
}

animate();
initAudio();
</script>
</body>
</html>
