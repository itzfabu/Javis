<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reactive HUD Pack - Settings</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap");
* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
body { background: #0f0f16; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.card { background: #17171f; border-radius: 16px; padding: 32px; max-width: 900px; width: 100%; display: flex; gap: 40px; }
h1 { font-size: 20px; margin-bottom: 4px; }
.sub { opacity: 0.6; font-size: 13px; margin-bottom: 24px; }
.section { margin-bottom: 24px; }
.section h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 10px; }
.swatches { display: flex; gap: 10px; align-items: center; }
.swatch { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s; }
.swatch:hover { transform: scale(1.1); }
.swatch.selected { border-color: #fff; }
.custom-swatch { width: 40px; height: 40px; border-radius: 50%; border: 2px dashed #555; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; background: #222; position: relative; overflow: hidden; }
.custom-swatch input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
.custom-swatch.selected { border-color: #fff; border-style: solid; }
.sizes { display: flex; gap: 10px; }
.size-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #333; background: #1e1e28; color: #eee; cursor: pointer; font-size: 13px; }
.size-btn.selected { background: #3d3d55; border-color: #7f7fff; }
.url-box { background: #0a0a10; border: 1px solid #333; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; word-break: break-all; margin-top: 8px; }
.copy-btn { margin-top: 10px; padding: 10px 18px; border-radius: 8px; border: none; background: #5affe6; color: #0a0a10; font-weight: 700; cursor: pointer; font-size: 13px; }
.test-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 13px; }
.preview { flex: 1; background: radial-gradient(circle, #04141a 0%, #000 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.preview iframe { border: none; width: 100%; height: 100%; }
.left { width: 320px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <div id="settingsGear" style="position:absolute; top:20px; right:20px; cursor:pointer; opacity:0.6; z-index:5;" title="Toggle settings">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#eee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
</div>
<div class="left" id="settingsLeft">
    <h1>Reactive HUD Pack</h1>
    <div class="sub">4 audio-reactive styles included. Pick a look, then copy the URL into your OBS Browser Source.</div>

    <div class="test-toggle">
      <input type="checkbox" id="testToggle" checked>
      <label for="testToggle">Preview with demo animation (no mic needed here)</label>
    </div>

    <div class="section">
      <h3>Widget Style</h3>
      <div class="sizes" id="styles"></div>
    </div>
    <div class="section">
      <h3>Color Theme</h3>
      <div class="swatches" id="swatches">
        <div class="custom-swatch" id="customSwatch">
          <span>+</span>
          <input type="color" id="customColorInput" value="#5affe6">
        </div>
      </div>
    </div>

    <div class="section">
      <h3>Size</h3>
      <div class="sizes" id="sizes"></div>
    </div>

    <div class="section">
      <h3>Your OBS Browser Source URL</h3>
      <div class="url-box" id="urlBox"></div>
      <button class="copy-btn" id="copyBtn">Copy URL</button>
    </div>
  </div>
  <div class="preview">
    <iframe id="previewFrame"></iframe>
  </div>
</div>

<script>
const THEMES = [
  { name: "cyan", hex: "#5affe6" },
  { name: "purple", hex: "#b266ff" },
  { name: "gold", hex: "#ffcf7f" },
  { name: "red", hex: "#ff5a6e" },
  { name: "green", hex: "#6fff8f" }
];
const SIZES = ["small", "medium", "large"];

let selectedTheme = "cyan";
let selectedSize = "medium";
let selectedStyle = "sphere";
let customColor = null;

const STYLES = [
  { name: "sphere", label: "Sphere", file: "streamer-hud-widget.html" },
  { name: "waveform", label: "Waveform", file: "waveform-widget.html" },
  { name: "vuring", label: "VU Ring", file: "vu-ring-widget.html" },
  { name: "burst", label: "Particle Burst", file: "particle-burst-widget.html" }
];
const stylesEl = document.getElementById("styles");
STYLES.forEach(s => {
  const el = document.createElement("button");
  el.className = "size-btn" + (s.name === selectedStyle ? " selected" : "");
  el.textContent = s.label;
  el.addEventListener("click", () => {
    selectedStyle = s.name;
    document.querySelectorAll("#styles .size-btn").forEach(b => b.classList.remove("selected"));
    el.classList.add("selected");
    update();
  });
  stylesEl.appendChild(el);
});

const swatchesEl = document.getElementById("swatches");
THEMES.forEach(t => {
  const el = document.createElement("div");
  el.className = "swatch" + (t.name === selectedTheme ? " selected" : "");
  el.style.background = t.hex;
  el.dataset.theme = t.name;
  el.addEventListener("click", () => {
    selectedTheme = t.name;
    customColor = null;
    document.querySelectorAll(".swatch, .custom-swatch").forEach(s => s.classList.remove("selected"));
    el.classList.add("selected");
    update();
  });
  swatchesEl.insertBefore(el, document.getElementById("customSwatch"));
});

document.getElementById("customColorInput").addEventListener("input", (e) => {
  customColor = e.target.value.replace("#", "");
  document.querySelectorAll(".swatch, .custom-swatch").forEach(s => s.classList.remove("selected"));
  document.getElementById("customSwatch").classList.add("selected");
  update();
});

const sizesEl = document.getElementById("sizes");
SIZES.forEach(s => {
  const el = document.createElement("button");
  el.className = "size-btn" + (s === selectedSize ? " selected" : "");
  el.textContent = s.charAt(0).toUpperCase() + s.slice(1);
  el.addEventListener("click", () => {
    selectedSize = s;
    document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("selected"));
    el.classList.add("selected");
    update();
  });
  sizesEl.appendChild(el);
});

document.getElementById("testToggle").addEventListener("change", update);

function update() {
  const styleObj = STYLES.find(s => s.name === selectedStyle) || STYLES[0];
  const colorParam = customColor ? ("&color=" + customColor) : ("&theme=" + selectedTheme);
  const url = "http://localhost:8877/" + styleObj.file + "?size=" + selectedSize + colorParam;
  document.getElementById("urlBox").textContent = url;

  const testMode = document.getElementById("testToggle").checked;
  const previewSrc = styleObj.file + "?size=" + selectedSize + colorParam + "&bg=dark" + (testMode ? "&test=1" : "");
  document.getElementById("previewFrame").src = previewSrc;
}

document.getElementById("copyBtn").addEventListener("click", () => {
  const url = document.getElementById("urlBox").textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById("copyBtn");
    const original = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
});

update();

document.getElementById("settingsGear").addEventListener("click", () => {
  const panel = document.getElementById("settingsLeft");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
});
</script>
</body>
</html>
