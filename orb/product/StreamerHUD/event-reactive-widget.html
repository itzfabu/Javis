<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Streamer HUD Widget - Event Reactive</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace; }
html, body { background: transparent !important; width: 100%; height: 100%; overflow: hidden; }
body.bg-dark { background: #0a0a12 !important; }
#container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
#diag { position: absolute; bottom: 8px; left: 8px; font-size: 10px; color: #5affe6; background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 4px; white-space: pre; max-width: 300px; }
#setup { position: absolute; top: 20px; left: 20px; color: #eee; font-size: 12px; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; max-width: 340px; }
#setup a { color: #5affe6; }
</style>
</head>
<body>
<div id="container"><canvas id="c"></canvas></div>
<div id="setup"></div>
<div id="diag"></div>
<script>
const params = new URLSearchParams(window.location.search);
if (params.get("bg") === "dark") document.body.classList.add("bg-dark");
const showDiag = params.has("diag");
document.getElementById("diag").style.display = showDiag ? "block" : "none";

const CLIENT_ID = params.get("client_id") || localStorage.getItem("twitchClientId") || "";
if (CLIENT_ID) localStorage.setItem("twitchClientId", CLIENT_ID);

const THEMES = { cyan: "#5affe6", purple: "#b266ff", gold: "#ffcf7f", red: "#ff5a6e", green: "#6fff8f" };
const themeName = params.get("theme") || "cyan";
const customColor = params.get("color");
const burstColor = customColor ? ("#" + customColor) : (THEMES[themeName] || THEMES.cyan);
const SIZES = { small: 220, medium: 320, large: 460 };
const dim = SIZES[params.get("size") || "medium"] || 320;

const canvas = document.getElementById("c");
canvas.width = dim; canvas.height = dim;
const ctx = canvas.getContext("2d");

function hexToRgb(hex) {
  const h = hex.replace("#", "");
  return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
}
const [rC, gC, bC] = hexToRgb(burstColor);

let particles = [];
const ambient = [];
for (let i = 0; i < 14; i++) {
  ambient.push({ angle: Math.random() * Math.PI * 2, radius: dim * (0.05 + Math.random() * 0.12), speed: 0.002 + Math.random() * 0.003, size: 1.5 + Math.random() * 2 });
}
function spawnBurst(intensity) {
  const count = Math.round(50 * intensity);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = (1.5 + Math.random() * 3.5) * intensity;
    particles.push({ x: 0, y: 0, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, decay: 0.006 + Math.random() * 0.01, size: 2 + Math.random() * 3 });
  }
}
function render() {
  requestAnimationFrame(render);
  ctx.clearRect(0, 0, dim, dim);
  const cx = dim / 2, cy = dim / 2;
  ambient.forEach(a => {
    a.angle += a.speed;
    const x = cx + Math.cos(a.angle) * a.radius, y = cy + Math.sin(a.angle) * a.radius;
    ctx.beginPath(); ctx.arc(x, y, a.size, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(" + rC + "," + gC + "," + bC + ",0.35)";
    ctx.shadowBlur = 4; ctx.shadowColor = burstColor; ctx.fill();
  });
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vx *= 0.97; p.vy *= 0.97; p.life -= p.decay;
    ctx.beginPath(); ctx.arc(cx + p.x, cy + p.y, p.size * Math.max(0, p.life), 0, Math.PI * 2);
    ctx.fillStyle = "rgba(" + rC + "," + gC + "," + bC + "," + Math.max(0, p.life) + ")";
    ctx.shadowBlur = 10; ctx.shadowColor = burstColor; ctx.fill();
  });
}
render();

let lastEvent = "waiting for events...";
function logDiag() {
  if (!showDiag) return;
  document.getElementById("diag").textContent = "Client ID set: " + (!!CLIENT_ID) + "\nStatus: " + lastEvent + "\nParticles: " + particles.length;
}
setInterval(logDiag, 500);

const setupEl = document.getElementById("setup");
function showSetupMessage(html) { setupEl.innerHTML = html; }
function hideSetup() { setupEl.style.display = "none"; }

async function main() {
  if (!CLIENT_ID) {
    showSetupMessage("No Twitch Client ID set. Add ?client_id=YOUR_ID to the URL once - see Setup-Guide.md for how to get one.");
    return;
  }

  const hash = new URLSearchParams(window.location.hash.replace("#", "?"));
  let token = hash.get("access_token") || localStorage.getItem("twitchAccessToken");

  if (!token) {
    const redirectUri = window.location.origin + window.location.pathname;
    const scopes = "channel:read:subscriptions moderator:read:followers";
    const authUrl = "https://id.twitch.tv/oauth2/authorize?client_id=" + CLIENT_ID +
      "&redirect_uri=" + encodeURIComponent(redirectUri) +
      "&response_type=token&scope=" + encodeURIComponent(scopes);
    showSetupMessage('Not logged in to Twitch yet. <a href="' + authUrl + '">Click here to authorize once</a>, then reopen this widget.');
    return;
  }

  localStorage.setItem("twitchAccessToken", token);
  if (window.location.hash) history.replaceState(null, "", window.location.pathname + window.location.search);

  let userRes;
  try {
    userRes = await fetch("https://api.twitch.tv/helix/users", {
      headers: { "Authorization": "Bearer " + token, "Client-Id": CLIENT_ID }
    });
    if (!userRes.ok) throw new Error("HTTP " + userRes.status);
  } catch (e) {
    localStorage.removeItem("twitchAccessToken");
    showSetupMessage("Login expired or invalid. Reload this page to log in again.");
    return;
  }
  const userData = await userRes.json();
  const broadcasterId = userData.data[0].id;
  hideSetup();

  const ws = new WebSocket("wss://eventsub.wss.twitch.tv/ws");
  let sessionId = null;

  ws.onmessage = async (msg) => {
    const data = JSON.parse(msg.data);
    if (data.metadata.message_type === "session_welcome") {
      sessionId = data.payload.session.id;
      lastEvent = "connected, subscribing...";
      await subscribe("channel.follow", "2", { broadcaster_user_id: broadcasterId, moderator_user_id: broadcasterId });
      await subscribe("channel.subscribe", "1", { broadcaster_user_id: broadcasterId });
      await subscribe("channel.raid", "1", { to_broadcaster_user_id: broadcasterId });
      lastEvent = "listening for follows/subs/raids";
    } else if (data.metadata.message_type === "notification") {
      const type = data.metadata.subscription_type;
      lastEvent = "event: " + type;
      const intensity = type === "channel.raid" ? 2 : (type === "channel.subscribe" ? 1.5 : 1);
      spawnBurst(intensity);
    }
  };
  ws.onerror = () => { lastEvent = "websocket error"; };
  ws.onclose = () => { lastEvent = "disconnected"; };

  async function subscribe(type, version, condition) {
    try {
      await fetch("https://api.twitch.tv/helix/eventsub/subscriptions", {
        method: "POST",
        headers: { "Authorization": "Bearer " + token, "Client-Id": CLIENT_ID, "Content-Type": "application/json" },
        body: JSON.stringify({ type, version, condition, transport: { method: "websocket", session_id: sessionId } })
      });
    } catch (e) {
      lastEvent = "subscribe failed: " + type;
    }
  }
}

if (params.has("test")) {
  hideSetup();
  setInterval(() => spawnBurst(1 + Math.random()), 4000 + Math.random() * 6000);
} else {
  main();
}
</script>
</body>
</html>
