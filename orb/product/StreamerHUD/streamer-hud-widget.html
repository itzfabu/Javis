<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Streamer HUD Widget</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: transparent !important;
  width: 100%; height: 100%;
  overflow: hidden;
}
body.bg-dark { background: #0a0a12 !important; }
#coreContainer {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
#diag {
  position: absolute; bottom: 8px; left: 8px;
  font-family: monospace; font-size: 10px;
  color: #5affe6; background: rgba(0,0,0,0.4);
  padding: 4px 8px; border-radius: 4px;
  display: none;
  white-space: pre;
}
</style>
</head>
<body>
<div id="coreContainer"></div>
<div id="diag">Diagnostics loading...</div>
<script>
const params = new URLSearchParams(window.location.search);
const showDiag = params.has("diag");
if (showDiag) document.getElementById("diag").style.display = "block";
if (params.get("bg") === "dark") document.body.classList.add("bg-dark");

// Theme presets - customization option #1
const THEMES = {
  cyan:   { hex: 0x5affe6, hueBase: 0.5 },
  purple: { hex: 0xb266ff, hueBase: 0.75 },
  gold:   { hex: 0xffcf7f, hueBase: 0.11 },
  red:    { hex: 0xff5a6e, hueBase: 0.98 },
  green:  { hex: 0x6fff8f, hueBase: 0.33 }
};
const themeName = params.get("theme") || "cyan";
const customColorParam = params.get("color");
const theme = customColorParam
  ? { hex: parseInt(customColorParam, 16), hueBase: null }
  : (THEMES[themeName] || THEMES.cyan);

if (theme.hueBase === null) {
  const r = ((theme.hex >> 16) & 255) / 255, g = ((theme.hex >> 8) & 255) / 255, b = (theme.hex & 255) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0;
  if (max !== min) {
    const d = max - min;
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0));
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h /= 6;
  }
  theme.hueBase = h;
}

const testMode = params.has("test");

// Size preset - customization option #2
const SIZES = { small: 200, medium: 300, large: 420 };
const sizeName = params.get("size") || "medium";
const sizePx = SIZES[sizeName] || SIZES.medium;
document.getElementById("coreContainer").style.width = sizePx + "px";
document.getElementById("coreContainer").style.height = sizePx + "px";

let persistedError = null;
function logDiag(statusLine) {
  if (!showDiag) return;
  const el = document.getElementById("diag");
  el.textContent = persistedError ? ("ERROR: " + persistedError + "\n" + statusLine) : statusLine;
}

let coreScene, coreCamera, coreRenderer, coreParticles, basePositions;
let speakTime = 0;

function initCore() {
  const container = document.getElementById("coreContainer");
  coreScene = new THREE.Scene();
  coreCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  coreCamera.position.z = 4.2;
  coreRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  coreRenderer.setSize(sizePx, sizePx);
  container.appendChild(coreRenderer.domElement);
  const count = 4500;
  basePositions = new Float32Array(count * 3);
  const radius = 1.0;
  for (let i = 0; i < count; i++) {
    const y = 1 - (i / (count - 1)) * 2;
    const r = Math.sqrt(1 - y * y);
    const th = Math.PI * (1 + Math.sqrt(5)) * i;
    const x = Math.cos(th) * r;
    const z = Math.sin(th) * r;
    const jitter = 1 + (Math.random() - 0.5) * 0.06;
    basePositions[i*3] = x * radius * jitter;
    basePositions[i*3+1] = y * radius * jitter;
    basePositions[i*3+2] = z * radius * jitter;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(basePositions.slice(), 3));
  const canvas = document.createElement("canvas");
  canvas.width = 16; canvas.height = 16;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createRadialGradient(8,8,0,8,8,8);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad; ctx.fillRect(0,0,16,16);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.PointsMaterial({ size: 0.045, map: tex, transparent: true, opacity: 0.9, color: theme.hex, depthWrite: false, blending: THREE.AdditiveBlending });
  coreParticles = new THREE.Points(geo, mat);
  coreScene.add(coreParticles);
  animateCore();
}

let audioCtx, analyser, freqData;
let smoothedLow = 0, smoothedMid = 0, smoothedHigh = 0, smoothedOverall = 0;
let activity = 0;

async function initAudio() {
  if (testMode) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    source.connect(analyser);
  } catch (e) {
    persistedError = e.name + ": " + e.message;
  }
}

let testClock = 0;
function getBandLevels() {
  if (testMode) {
    testClock += 0.02;
    const wave = (Math.sin(testClock) + 1) / 2;
    const talkBurst = Math.max(0, Math.sin(testClock * 0.3)) * wave;
    return { low: talkBurst * 0.5, mid: talkBurst * 0.4, high: talkBurst * 0.6, overall: talkBurst * 0.5 };
  }
  if (!analyser) return { low: 0, mid: 0, high: 0, overall: 0 };
  analyser.getByteFrequencyData(freqData);
  const n = freqData.length;
  const lowEnd = Math.floor(n * 0.15), midEnd = Math.floor(n * 0.5);
  let lowSum = 0, midSum = 0, highSum = 0;
  for (let i = 0; i < lowEnd; i++) lowSum += freqData[i];
  for (let i = lowEnd; i < midEnd; i++) midSum += freqData[i];
  for (let i = midEnd; i < n; i++) highSum += freqData[i];
  const low = (lowSum / lowEnd) / 255;
  const mid = (midSum / (midEnd - lowEnd)) / 255;
  const high = (highSum / (n - midEnd)) / 255;
  return { low, mid, high, overall: (low + mid + high) / 3 };
}

function animateCore() {
  requestAnimationFrame(animateCore);
  const bands = getBandLevels();

  const bandSmoothing = 0.12;
  smoothedLow += (bands.low - smoothedLow) * bandSmoothing;
  smoothedMid += (bands.mid - smoothedMid) * bandSmoothing;
  smoothedHigh += (bands.high - smoothedHigh) * bandSmoothing;
  smoothedOverall += (bands.overall - smoothedOverall) * bandSmoothing;

  const targetActivity = Math.min(1, smoothedOverall / 0.15);
  activity += (targetActivity - activity) * 0.05;

  speakTime += 0.05 + activity * 0.05;

  const wobbleAmount = 0.012 + activity * (0.02 + smoothedHigh * 0.05);
  const posAttr = coreParticles.geometry.attributes.position;
  const arr = posAttr.array;
  for (let i = 0; i < arr.length / 3; i++) {
    const wobble = 1 + (smoothedLow * 0.04 * activity + wobbleAmount * Math.sin(speakTime * 2 + i * 0.3));
    arr[i*3] = basePositions[i*3] * wobble;
    arr[i*3+1] = basePositions[i*3+1] * wobble;
    arr[i*3+2] = basePositions[i*3+2] * wobble;
  }
  posAttr.needsUpdate = true;

  coreParticles.rotation.y += 0.0015 + activity * (0.004 + smoothedOverall * 0.006);
  const hue = (theme.hueBase - smoothedHigh * 0.08 * activity + 1) % 1;
  coreParticles.material.color.setHSL(hue, 1, 0.65);

  logDiag(
    "Theme: " + themeName + " | Size: " + sizeName +
    " | Audio: " + (audioCtx ? audioCtx.state : "none") +
    " | activity:" + activity.toFixed(2)
  );

  coreRenderer.render(coreScene, coreCamera);
}

initCore();
initAudio();
</script>
</body>
</html>
